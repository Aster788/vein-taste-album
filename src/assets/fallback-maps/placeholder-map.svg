<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Map fallback illustration</title>
  <desc id="desc">A warm paper style city map placeholder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ee" />
      <stop offset="100%" stop-color="#efe8df" />
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#d9cec2" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" />
  <rect width="1200" height="720" fill="url(#grid)" opacity="0.55" />
  <g stroke="#bba996" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M84 560 C220 470, 360 460, 512 382 S860 280, 1098 180" stroke-width="10" opacity="0.45" />
    <path d="M95 220 C240 280, 290 340, 430 330 S740 250, 960 290" stroke-width="6" opacity="0.38" />
    <path d="M170 640 C300 590, 440 560, 580 520 S880 435, 1055 410" stroke-width="7" opacity="0.38" />
  </g>
  <g fill="#9e7c65">
    <circle cx="312" cy="345" r="12" />
    <circle cx="568" cy="514" r="12" />
    <circle cx="848" cy="302" r="12" />
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="92" font-size="34" fill="#705948" opacity="0.92">Static City Map Preview</text>
    <text x="600" y="132" font-size="20" fill="#866c57" opacity="0.9">Shown when live map network is unavailable</text>
  </g>
</svg>
